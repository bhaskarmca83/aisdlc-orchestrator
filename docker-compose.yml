services:
  redis:
    image: redis:7-alpine
    ports: ["6380:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: sdlc_db
      POSTGRES_USER: sdlc
      POSTGRES_PASSWORD: sdlc
    ports: ["5433:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sdlc -d sdlc_db"]
      interval: 5s
      timeout: 3s
      retries: 10